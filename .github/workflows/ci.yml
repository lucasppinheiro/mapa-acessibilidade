name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, testes, cobertura, contrato e build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      ACCESS_TOKEN_SECRET: ci-access-token-secret-with-at-least-32-characters
      DEMO_WRITE_MODE: moderated
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Instalar dependências
        run: npm run setup

      - name: Lint
        run: npm run lint

      - name: Testes unitários e de integração
        run: npm run test

      - name: Cobertura mínima
        run: npm run coverage

      - name: Validar OpenAPI 3.1
        run: npm run openapi:lint

      - name: Build de produção
        env:
          NODE_ENV: production
        run: npm run build:production

  e2e:
    name: E2E e acessibilidade automatizada
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Instalar dependências
        run: npm run setup

      - name: Instalar Chromium do Playwright
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Executar testes E2E
        run: npm run e2e
